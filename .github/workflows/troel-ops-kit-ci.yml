name: TROEL OPS Kit CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/troel-ops-kit-ci.yml"
      - "README.md"
      - "TROEL OPS Kit/**"
  pull_request:
    paths:
      - ".github/workflows/troel-ops-kit-ci.yml"
      - "README.md"
      - "TROEL OPS Kit/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./TROEL OPS Kit"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src

      - name: Tests
        run: pytest -q
